name: Cupzone Backend CI

on:
  push:
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Check code NodeJs
  test-code:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v6

      - name: 2. Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. Install dependencies
        run: npm ci

      # - name: 4. Run Unit Test
      #   run: npm test

  # JOB 2: Check Docker build
  test-docker-build:
    runs-on: ubuntu-latest
    needs: test-code # Need Job 1 complete
    
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v6

      # Use Docker's BuildX to build fast and support cache
      - name: 2. Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Try build image to verify Dockerfile correct.
      - name: 3. Test Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false 
          tags: cupzone-backend:test
          cache-from: type=gha # Use GitHub Actions's cache to minimize building time
          cache-to: type=gha,mode=max